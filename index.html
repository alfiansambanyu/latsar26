<!doctype html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Informasi Tera</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#e0f2fe,#bae6fd);
min-height:100vh;
}

.status-badge{
padding:6px 12px;
border-radius:6px;
font-size:14px;
font-weight:600;
}

.status-diterima{background:#dbeafe;color:#1e40af;}
.status-proses{background:#fef3c7;color:#92400e;}
.status-selesai{background:#dcfce7;color:#166534;}
.status-ditolak{background:#fee2e2;color:#991b1b;}

.button-primary{
background:#0284c7;
color:white;
padding:10px 20px;
border-radius:8px;
}

.button-primary:hover{
background:#0369a1;
}

.input-field{
border:2px solid #bae6fd;
padding:10px;
border-radius:8px;
width:100%;
}

.card-result{
background:white;
border-radius:10px;
padding:20px;
border-left:5px solid #0284c7;
}

</style>
</head>

<body>

<div class="max-w-4xl mx-auto p-6">

<!-- HEADER -->

<div class="mb-6">
<h1 class="text-3xl font-bold flex items-center gap-2">
<i data-lucide="search-check"></i>
SILAT NEGORO Sistem Informasi Tera/Tera Ulang Bojonegoro
</h1>

<p class="text-gray-600">
UPTD Metrologi Legal Dinas Perdagangan, Koperasi dan Usaha Mikro
</p>
</div>

<!-- SEARCH -->

<div class="bg-white p-6 rounded-lg shadow mb-6">

<h2 class="font-bold mb-3">Cek Status Layanan</h2>

<div class="flex gap-2">

<input
id="search-input"
class="input-field"
placeholder="Masukkan nomor layanan"
/>

<button
id="search-btn"
class="button-primary"
>
Cari
</button>

</div>

</div>

<!-- HASIL -->

<div id="results-container" class="space-y-4 mb-8">

<div class="text-center text-gray-500">

<i data-lucide="inbox" style="width:40px;height:40px;margin:auto;"></i>

<p>Masukkan nomor layanan</p>

</div>

</div>

<!-- TABLE DATA -->

<div class="bg-white p-6 rounded-lg shadow">

<h2 class="font-bold mb-4 flex items-center gap-2">
<i data-lucide="table"></i>
Data Semua Layanan
</h2>

<div class="overflow-x-auto">

<table class="w-full text-sm">

<thead>

<tr class="border-b bg-blue-50">

<th class="text-left p-2">Nomor</th>
<th class="text-left p-2">Nama</th>
<th class="text-left p-2">Jenis</th>
<th class="text-left p-2">Status</th>

</tr>

</thead>

<tbody id="data-table-body">

<tr>
<td colspan="4" class="text-center p-4">Loading...</td>
</tr>

</tbody>

</table>

</div>

</div>

<!-- FORM BUTTON -->

<div class="mt-8">

<button
id="form-button"
class="button-primary w-full"
>

Ajukan Permohonan Tera / Tera Ulang

</button>

</div>

</div>

<script>

let allData=[];

/* GANTI SPREADSHEET ID */

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSabRsCKk4xRAHNzpX25t5Bs2JAA-w1l2sycvl4AIQaYTe7BFFwBjQTiyxReGp3jp10u1PAVHNEK2bu/pub?gid=1685468197&single=true&output=csv";

/* LOAD DATA */

async function loadSpreadsheetData(){

try{

const response=await fetch(sheetURL);

const text=await response.text();

const json=JSON.parse(text.substr(47).slice(0,-2));

const rows=json.table.rows;

allData=rows.map(r=>({

nomor_layanan:r.c[0]?.v||"",
tanggal_diterima:r.c[1]?.v||"",
nama_pemilik:r.c[2]?.v||"",
lokasi:r.c[3]?.v||"",
jenis_layanan:r.c[4]?.v||"",
status:r.c[5]?.v||"",
keterangan:r.c[6]?.v||""

}));

renderTable();

}

catch(e){

console.error(e);

}

}

/* RENDER TABLE */

function renderTable(){

const tbody=document.getElementById("data-table-body");

if(allData.length===0){

tbody.innerHTML=
"<tr><td colspan='4' class='text-center p-4'>Tidak ada data</td></tr>";

return;

}

tbody.innerHTML=allData.map(item=>`

<tr class="border-b hover:bg-blue-50">

<td class="p-2 font-semibold">
${item.nomor_layanan}
</td>

<td class="p-2">
${item.nama_pemilik}
</td>

<td class="p-2">
${item.jenis_layanan}
</td>

<td class="p-2">

<span class="status-badge status-${item.status.toLowerCase().replace(/\s+/g,'-')}">

${item.status}

</span>

</td>

</tr>

`).join("");

lucide.createIcons();

}

/* SEARCH */

document.getElementById("search-btn").addEventListener("click",()=>{

const value=
document.getElementById("search-input")
.value
.toLowerCase();

const container=
document.getElementById("results-container");

const found=
allData.filter(d=>
d.nomor_layanan
.toLowerCase()
.includes(value)
);

if(found.length===0){

container.innerHTML=
"<p class='text-center text-gray-500'>Data tidak ditemukan</p>";

return;

}

container.innerHTML=
found.map(item=>`

<div class="card-result">

<div class="grid md:grid-cols-2 gap-4">

<div>
<p class="text-sm text-gray-500">Nomor</p>
<p class="font-bold">${item.nomor_layanan}</p>
</div>

<div>
<p class="text-sm text-gray-500">Tanggal</p>
<p>${item.tanggal_diterima}</p>
</div>

<div>
<p class="text-sm text-gray-500">Nama</p>
<p>${item.nama_pemilik}</p>
</div>

<div>
<p class="text-sm text-gray-500">Lokasi</p>
<p>${item.lokasi}</p>
</div>

<div>
<p class="text-sm text-gray-500">Jenis</p>
<p>${item.jenis_layanan}</p>
</div>

<div>
<p class="text-sm text-gray-500">Status</p>

<span class="status-badge status-${item.status.toLowerCase().replace(/\s+/g,'-')}">

${item.status}

</span>

</div>

</div>

</div>

`).join("");

});

/* ENTER SEARCH */

document
.getElementById("search-input")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

document.getElementById("search-btn").click();

}

});

/* BUTTON FORM */

document.getElementById("form-button").addEventListener("click",()=>{

window.open(
"https://forms.gle/CSYjoiVNAVi9w9P97",
"_blank"
);

});

/* INIT */

loadSpreadsheetData();

lucide.createIcons();

</script>

</body>
</html>
