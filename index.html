<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SILAT NEGORO</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#4f8edc,#2a5fa4);
min-height:100vh;
color:#333;
}

  
/* HEADER */

header{
text-align:center;
color:white;
padding:20px 10px;
}

header img{
height:90px;
margin-bottom:10px;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:10px;
}

/* CARD */

.card{
background:white;
border-radius:14px;
padding:20px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.title{
font-size:18px;
font-weight:bold;
border-bottom:2px solid #3b82c4;
padding-bottom:6px;
margin-bottom:12px;
}

/* INPUT */

input{
width:100%;
padding:14px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
background:#3b82c4;
border:none;
border-radius:8px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* DATA */

.row{margin-bottom:10px}

.label{
font-size:12px;
color:#777;
}

.value{
font-weight:bold;
margin-top:2px;
}

/* WORKFLOW */

.tracking{
margin:35px 0;
position:relative;
}

.progress-line{
position:absolute;
top:25px;
left:25px;
width:calc(100% - 50px);
height:6px;
background:#ddd;
border-radius:4px;
}

.progress{
position:absolute;
top:25px;
left:25px;
height:6px;
background:#4cbb17;
border-radius:4px;
transition:0.4s;
max-width:calc(100% - 50px);
}
.steps{
display:flex;
justify-content:space-between;
position:relative;
}

.step{
text-align:center;
width:25%;
}

/* ICON */

.circle{
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:22px;
color:white;
font-weight:bold;
position:relative;
z-index:2;
}

/* LABEL */

.label-step{
margin-top:6px;
font-size:12px;
font-weight:bold;
}

/* COLORS */

.diterima{
background:#e6cff2;
color:#000;
}

.jadwal{
background:#8a2be2;
}

.uji{
background:#fffc00;
color:#000;
}

.selesai{
background:#4cbb17;
}

.perbaikan{
background:#ff0800;
}

/* ANIMATION */

.active{
animation:pulse 1.3s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* FORM BUTTON */

.form-btn a{
display:block;
background:#FF2800;
color:white;
padding:14px;
border-radius:8px;
text-decoration:none;
text-align:center;
font-weight:bold;
font-size:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
  .form-btn a:hover{
background:#d61f00;
}

/* FOOTER */

footer{
text-align:center;
color:white;
font-size:12px;
margin-top:10px;
padding-bottom:15px;
}

</style>
</head>

<body>

<header>

<img src="Logo-Kabupaten-Bojonegoro.png">

<h2>UPTD METROLOGI LEGAL KABUPATEN BOJONEGORO</h2>

<p><b>SILAT NEGORO</b></p>
<p>Sistem Informasi Layanan Tera/Tera Ulang</p>

</header>

<div class="container">

<div class="card">

<div class="title">Cek Status Layanan</div>

<input id="search" placeholder="Masukkan Nomor Layanan">

<button onclick="cekLayanan()">Cari Status</button>

<div id="hasil"></div>

</div>

<div class="card form-btn">

<a href="https://forms.gle/xixjsguVMUgHeTwZ7">
Ajukan Permohonan Tera/Tera Ulang
</a>

</div>

</div>

<footer>
© 2026 Dinas Perdagangan Koperasi dan Usaha Mikro Kabupaten Bojonegoro
</footer>

<script>

let sheetData=[]

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSabRsCKk4xRAHNzpX25t5Bs2JAA-w1l2sycvl4AIQaYTe7BFFwBjQTiyxReGp3jp10u1PAVHNEK2bu/pub?gid=1685468197&single=true&output=csv&t="+Date.now()

function parseCSV(text){
return text.split("\n").map(r=>r.split(","))
}

document.getElementById("search").addEventListener("keypress",function(e){
if(e.key==="Enter"){cekLayanan()}
})

function workflow(status){

status=status.toLowerCase()

let progress="0%"

let s1="circle diterima"
let s2="circle jadwal"
let s3="circle uji"
let s4="circle selesai"

let icon1="📝"
let icon2="📅"
let icon3="🧪"
let icon4="✔"

let label4="Selesai"

/* DITERIMA */

if(status.includes("diterima")){
progress="0%"
s1+=" active"
}

/* DIJADWALKAN */

if(status.includes("dijadwalkan")){
progress="33%"
s2+=" active"
}

/* DIUJI */

if(status.includes("diuji")){
progress="66%"
s3+=" active"
}

/* SELESAI */

if(status.includes("selesai")){
progress="100%"
}

/* PERBAIKAN */

if(status.includes("perbaikan")){
progress="100%"
s4="circle perbaikan active"
icon4="⚠"
label4="Perlu Perbaikan"
}

return`

<div class="tracking">

<div class="progress-line"></div>
<div class="progress" style="width:calc(${progress} - 25px)"></div>

<div class="steps">

<div class="step">
<div class="${s1}">${icon1}</div>
<div class="label-step">Diterima</div>
</div>

<div class="step">
<div class="${s2}">${icon2}</div>
<div class="label-step">Sedang Dijadwalkan</div>
</div>

<div class="step">
<div class="${s3}">${icon3}</div>
<div class="label-step">Sedang Diuji</div>
</div>

<div class="step">
<div class="${s4}">${icon4}</div>
<div class="label-step">${label4}</div>
</div>

</div>

</div>

`
}

async function init(){

const res=await fetch(sheetURL)
const text=await res.text()

sheetData=parseCSV(text)

}

function cekLayanan(){

let val=document.getElementById("search").value.toLowerCase()
let hasil=document.getElementById("hasil")

for(let i=1;i<sheetData.length;i++){

let nomor=(sheetData[i][0]||"").toLowerCase()

if(nomor.includes(val)){

let status=sheetData[i][6]

hasil.innerHTML=`

<div class="row">
<div class="label">Nomor Layanan</div>
<div class="value">${sheetData[i][0]}</div>
</div>

<div class="row">
<div class="label">Jenis Layanan</div>
<div class="value">${sheetData[i][5]}</div>
</div>

<div class="row">
<div class="label">Status</div>
<div class="value">${status}</div>
</div>

${workflow(status)}

<div class="row">
<div class="label">Jadwal Pengujian</div>
<div class="value">${sheetData[i][2]}</div>
</div>

<div class="row">
<div class="label">Lokasi</div>
<div class="value">${sheetData[i][4]}</div>
</div>

<div class="row">
<div class="label">Keterangan</div>
<div class="value">${sheetData[i][7]}</div>
</div>

`

return
}

}

hasil.innerHTML="<b>Nomor layanan tidak ditemukan</b>"

}

init()

</script>

</body>
</html>
